<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>하루 한 조각, 오늘의 격언 | Daily Quotes</title>
  <meta name="description" content="매일 새로운 영감과 동기부여를 주는 한 조각의 격언을 만나보세요. 마음에 드는 격언을 보관하고 간편하게 공유할 수 있습니다.">
  <meta name="keywords" content="격언, 명언, 오늘의명언, 동기부여, 인생명언, 하루명언, Daily Quotes">
  <meta name="author" content="Antigravity">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="하루 한 조각, 오늘의 격언 | Daily Quotes">
  <meta property="og:description" content="매일 새로운 영감과 동기부여를 주는 한 조각의 격언을 만나보세요.">
  <meta property="og:image" content="assets/images/bg_dark.png">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="하루 한 조각, 오늘의 격언 | Daily Quotes">
  <meta property="twitter:description" content="매일 새로운 영감과 동기부여를 주는 한 조각의 격언을 만나보세요.">
  <meta property="twitter:image" content="assets/images/bg_dark.png">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Dynamic Backgrounds -->
  <div class="bg-container" id="bgContainer"></div>
  <div class="bg-overlay"></div>
  
  <!-- Floating Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Header -->
  <header>
    <a href="#" class="logo" id="logoLink">
      <!-- Quote Logo Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M9.983 3v8h-6v-8h6zm-6 6h4v-4h-4v4zm11-6v8h-6v-8h6zm-6 6h4v-4h-4v4zm-1 6v8h-6v-8h6zm-6 6h4v-4h-4v4zm11-6v8h-6v-8h6zm-6 6h4v-4h-4v4z" />
        <path d="M14 17h6v2h-6zm0-4h6v2h-6z"/>
      </svg>
      <span>Daily Quotes</span>
    </a>
    
    <div class="nav-actions">
      <!-- Favorites List Button -->
      <button class="icon-btn" id="favListBtn" aria-label="보관함 열기" title="보관함">
        <svg viewBox="0 0 24 24">
          <path d="M16.5 3C19.5376 3 22 5.5 22 9C22 16 14.5 20 12 21.5C9.5 20 2 16 2 9C2 5.5 4.5 3 7.5 3C9.35997 3 11 4 12 5C13 4 14.64 3 16.5 3Z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </svg>
        <span class="badge" id="favBadge" style="display: none;">0</span>
      </button>
      
      <!-- Theme Switch Button -->
      <button class="icon-btn" id="themeBtn" aria-label="배경 및 테마 설정" title="테마 설정">
        <svg viewBox="0 0 24 24">
          <path d="M12 3V4M12 20V21M4 12H3M21 12H20M18.364 5.636L17.657 6.343M6.343 17.657L5.636 18.364M18.364 18.364L17.657 17.657M6.343 5.636L5.636 6.343M12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main>
    <!-- Today Date Badge -->
    <div class="date-badge" id="todayDate">2026. 07. 11</div>
    
    <!-- Quote Card -->
    <div class="quote-card" id="quoteCard">
      <div class="quote-decor">“</div>
      <div class="category-tag" id="quoteCategory">Wisdom</div>
      
      <div class="quote-text-container">
        <p class="quote-kr" id="quoteKr">여기에 한국어 격언이 표시됩니다.</p>
        <p class="quote-en" id="quoteEn">English quote will be displayed here.</p>
        
        <div class="author-container">
          <span class="author-kr" id="authorKr">작가 이름</span>
          <span class="author-en" id="authorEn">Author Name</span>
        </div>
      </div>
      
      <!-- Actions -->
      <div class="card-actions">
        <!-- Share, Copy, Favorite Left side actions -->
        <div class="action-group">
          <!-- Favorite Add/Remove Toggle Button -->
          <button class="icon-btn" id="toggleFavBtn" aria-label="즐겨찾기 추가" title="즐겨찾기">
            <svg viewBox="0 0 24 24">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </button>
          
          <!-- Copy Clip Button -->
          <button class="icon-btn" id="copyBtn" aria-label="격언 복사" title="복사하기">
            <svg viewBox="0 0 24 24">
              <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
            </svg>
          </button>
          
          <!-- Share Link Button -->
          <button class="icon-btn" id="shareBtn" aria-label="격언 공유" title="X(트위터)로 공유">
            <svg viewBox="0 0 24 24">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </button>
        </div>
        
        <!-- Random / Next quote Right side action -->
        <button class="btn-primary" id="randomQuoteBtn" title="새로운 무작위 격언 보기">
          <svg viewBox="0 0 24 24">
            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
          </svg>
          <span>다른 격언</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Favorites Drawer Panel -->
  <div class="backdrop" id="backdrop"></div>
  <div class="drawer" id="favoritesDrawer">
    <div class="drawer-header">
      <div class="drawer-title">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <span>격언 보관함</span>
      </div>
      <button class="drawer-close" id="drawerClose" aria-label="보관함 닫기">
        <svg viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z" />
        </svg>
      </button>
    </div>
    <div class="drawer-content" id="favListContainer">
      <!-- Favorite items will be injected here by JS -->
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <div class="settings-title">
        <svg viewBox="0 0 24 24">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
        <span>테마 및 배경 설정</span>
      </div>
      <button class="drawer-close" id="settingsClose" aria-label="설정 닫기">
        <svg viewBox="0 0 24 24">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z" />
        </svg>
      </button>
    </div>
    <div class="theme-options">
      <!-- Dark Theme Option -->
      <div class="theme-option active" data-theme-val="dark" id="themeOptDark">
        <div class="theme-preview dark"></div>
        <div class="theme-name">감성 다크 모드</div>
      </div>
      <!-- Light Theme Option -->
      <div class="theme-option" data-theme-val="light" id="themeOptLight">
        <div class="theme-preview light"></div>
        <div class="theme-name">포근 라이트 모드</div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast-container" id="toastContainer">
    <div class="toast">
      <svg viewBox="0 0 24 24">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
      </svg>
      <span id="toastText">텍스트가 복사되었습니다.</span>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Daily Quotes. Inspired by wisdom, crafted with elegance.</p>
  </footer>

  <!-- Scripts -->
  <script src="quotes.js"></script>
  <script src="app.js"></script>
</body>
</html>
